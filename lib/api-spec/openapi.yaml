openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MyLocalTrade API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: traders
    description: Trader listing operations
  - name: profile
    description: Trader profile management
  - name: trader
    description: Trader onboarding and self-service
  - name: subscriptions
    description: Subscription and billing
  - name: saved
    description: Saved traders
  - name: enquiries
    description: Enquiries and leads
  - name: trader-documents
  - name: reviews
  - name: categories
    description: Trade categories
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register/customer:
    post:
      operationId: registerCustomer
      tags: [auth]
      summary: Register a new customer
      description: |
        Creates an inactive customer account and emails a verification link.
        The account cannot sign in until the email is verified. The response
        is a pending-registration acknowledgement, NOT a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCustomerRequest"
      responses:
        "201":
          description: Account created — verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPendingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register/trader:
    post:
      operationId: registerTrader
      tags: [auth]
      summary: Register a new trader
      description: |
        Creates an inactive trader account and an associated trader profile,
        then emails a verification link. The trader account becomes
        publicly visible only after a successful subscription payment
        webhook (see /subscriptions/checkout). The response is a
        pending-registration acknowledgement, NOT a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTraderRequest"
      responses:
        "201":
          description: Account created — verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPendingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerificationEmail
      tags: [auth]
      summary: Resend the email verification link
      description: |
        Resends the email-verification link for an unverified account.
        Always responds 200 with a generic message when the email is unknown
        (to avoid leaking which addresses are registered). Rate-limited to
        one request per 60 seconds per account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: Resend handled (success or already-verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Missing email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Cooldown still active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryAfterErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/onboarding-status:
    get:
      operationId: getTraderOnboardingStatus
      tags: [trader]
      summary: Get the signed-in trader's onboarding/verification status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderOnboardingStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not a trader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trader profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /traders:
    get:
      operationId: listTraders
      tags: [traders]
      summary: List traders with optional search/filter
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"

  /traders/featured:
    get:
      operationId: getFeaturedTraders
      tags: [traders]
      summary: Get featured traders
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Featured traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"

  /traders/{id}:
    get:
      operationId: getTrader
      tags: [traders]
      summary: Get trader by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "404":
          description: Trader not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getTraderProfile
      tags: [profile]
      summary: Get own trader profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Trader profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTraderProfile
      tags: [profile]
      summary: Update trader profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTraderProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/plans:
    get:
      operationId: getSubscriptionPlans
      tags: [subscriptions]
      summary: Get available subscription plans
      responses:
        "200":
          description: Subscription plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlansResponse"

  /subscriptions/checkout:
    post:
      operationId: createCheckoutSession
      tags: [subscriptions]
      summary: Create Stripe checkout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
      responses:
        "200":
          description: Checkout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/status:
    get:
      operationId: getSubscriptionStatus
      tags: [subscriptions]
      summary: Get current subscription status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/demo-activate:
    post:
      operationId: demoActivateSubscription
      tags: [subscriptions]
      summary: Activate subscription in demo mode (no Stripe)
      description: |
        Used only when the API is running without `STRIPE_SECRET_KEY`. The
        client receives a `demoActivationUrl` from `createCheckoutSession`
        and POSTs to this endpoint to flip the pending subscription into
        the `active` state immediately.
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: query
          required: true
          schema: { type: string }
        - name: planId
          in: query
          required: true
          schema:
            type: string
            enum: [basic, premium, elite]
      responses:
        "200":
          description: Demo subscription activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoActivateResponse"
        "400":
          description: Invalid or already-processed session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Demo activation not available in production
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/cancel:
    post:
      operationId: cancelSubscription
      tags: [subscriptions]
      summary: Schedule cancellation at period end
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cancellation scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionMutationResponse"
        "400":
          description: No active subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/resume:
    post:
      operationId: resumeSubscription
      tags: [subscriptions]
      summary: Undo a scheduled cancellation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionMutationResponse"
        "400":
          description: No scheduled cancellation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/documents:
    get:
      operationId: getTraderDocuments
      tags: [trader-documents]
      summary: List the current trader's verification documents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Documents and evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderDocumentsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: registerTraderDocument
      tags: [trader-documents]
      summary: Register a successfully uploaded document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTraderDocumentRequest"
      responses:
        "201":
          description: Document registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterTraderDocumentResponse"
        "400":
          description: Invalid document data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/documents/upload-url:
    post:
      operationId: getTraderDocumentUploadUrl
      tags: [trader-documents]
      summary: Request a presigned PUT URL for uploading a document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/documents/{id}:
    delete:
      operationId: deleteTraderDocument
      tags: [trader-documents]
      summary: Delete a pending or rejected trader document
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTraderDocumentResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Approved documents cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review for a trader (customer must have a non-pending enquiry)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review submitted (pending moderation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid review data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Customer has no eligible enquiry with this trader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A review for this enquiry already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/eligible:
    get:
      operationId: getEligibleEnquiriesForReview
      tags: [reviews]
      summary: List of customer's enquiries that are eligible for a new review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Eligible enquiries (already reviewed entries are excluded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibleEnquiriesResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /traders/{id}/reviews:
    get:
      operationId: getTraderReviews
      tags: [reviews]
      summary: Public list of approved reviews for a trader
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderReviewsResponse"
        "404":
          description: Trader not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/reviews:
    get:
      operationId: getMyTraderReviews
      tags: [reviews]
      summary: Reviews left for the authenticated trader (any status)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All reviews for this trader, including pending and rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderReviewsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/reviews/{id}/reply:
    post:
      operationId: replyToReview
      tags: [reviews]
      summary: Trader posts (or updates) a public reply to one of their reviews
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyToReviewRequest"
      responses:
        "200":
          description: Updated review with reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the trader who owns this review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/reviews:
    get:
      operationId: adminListReviews
      tags: [reviews]
      summary: Admin moderation queue
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, FLAGGED]
      responses:
        "200":
          description: Reviews for moderation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReviewsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/reviews/{id}/moderate:
    post:
      operationId: adminModerateReview
      tags: [reviews]
      summary: Approve / reject / flag a review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerateReviewRequest"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/stripe:
    post:
      operationId: handleStripeWebhook
      tags: [subscriptions]
      summary: Handle Stripe webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /saved-traders:
    get:
      operationId: getSavedTraders
      tags: [saved]
      summary: Get saved traders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saved-traders/{traderId}:
    post:
      operationId: saveTrader
      tags: [saved]
      summary: Save a trader
      security:
        - bearerAuth: []
      parameters:
        - name: traderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unsaveTrader
      tags: [saved]
      summary: Remove saved trader
      security:
        - bearerAuth: []
      parameters:
        - name: traderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enquiries:
    post:
      operationId: createEnquiry
      tags: [enquiries]
      summary: Send an enquiry to a trader
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnquiryRequest"
      responses:
        "201":
          description: Enquiry sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getEnquiries
      tags: [enquiries]
      summary: Get enquiries (trader sees received, customer sees sent)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Enquiries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnquiryListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get all trade categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterCustomerRequest:
      type: object
      properties:
        email:
          type: string
