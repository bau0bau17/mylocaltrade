openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MyLocalTrade API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: traders
    description: Trader listing operations
  - name: profile
    description: Trader profile management
  - name: trader
    description: Trader onboarding and self-service
  - name: subscriptions
    description: Subscription and billing
  - name: saved
    description: Saved traders
  - name: enquiries
    description: Enquiries and leads
  - name: trader-documents
  - name: reviews
  - name: categories
    description: Trade categories
  - name: conversations
    description: Customer-trader conversations and messages
  - name: push-tokens
    description: Mobile push notification token registration
  - name: companies-house
    description: UK Companies House lookups (public)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register/customer:
    post:
      operationId: registerCustomer
      tags: [auth]
      summary: Register a new customer
      description: |
        Creates an inactive customer account and emails a verification link.
        The account cannot sign in until the email is verified. The response
        is a pending-registration acknowledgement, NOT a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCustomerRequest"
      responses:
        "201":
          description: Account created — verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPendingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register/trader:
    post:
      operationId: registerTrader
      tags: [auth]
      summary: Register a new trader
      description: |
        Creates an inactive trader account and an associated trader profile,
        then emails a verification link. The trader account becomes
        publicly visible only after a successful subscription payment
        webhook (see /subscriptions/checkout). The response is a
        pending-registration acknowledgement, NOT a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTraderRequest"
      responses:
        "201":
          description: Account created — verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPendingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerificationEmail
      tags: [auth]
      summary: Resend the email verification link
      description: |
        Resends the email-verification link for an unverified account.
        Always responds 200 with a generic message when the email is unknown
        (to avoid leaking which addresses are registered). Rate-limited to
        one request per 60 seconds per account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: Resend handled (success or already-verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Missing email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Cooldown still active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryAfterErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/onboarding-status:
    get:
      operationId: getTraderOnboardingStatus
      tags: [trader]
      summary: Get the signed-in trader's onboarding/verification status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderOnboardingStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not a trader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trader profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me/notification-settings:
    patch:
      operationId: updateNotificationSettings
      tags: [auth]
      summary: Update the current user's global notification preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationSettingsRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNotificationSettingsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/lead-reminder-settings:
    get:
      operationId: getLeadReminderSettings
      tags: [trader]
      summary: Get the current trader's lead-reminder delay preference
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadReminderSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a trader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLeadReminderSettings
      tags: [trader]
      summary: Update the current trader's lead-reminder delay preference
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadReminderSettingsRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadReminderSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a trader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /traders:
    get:
      operationId: listTraders
      tags: [traders]
      summary: List traders with optional search/filter
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"

  /traders/featured:
    get:
      operationId: getFeaturedTraders
      tags: [traders]
      summary: Get featured traders
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Featured traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"

  /traders/{id}:
    get:
      operationId: getTrader
      tags: [traders]
      summary: Get trader by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "404":
          description: Trader not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getTraderProfile
      tags: [profile]
      summary: Get own trader profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Trader profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTraderProfile
      tags: [profile]
      summary: Update trader profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTraderProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/plans:
    get:
      operationId: getSubscriptionPlans
      tags: [subscriptions]
      summary: Get available subscription plans
      responses:
        "200":
          description: Subscription plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlansResponse"

  /subscriptions/checkout:
    post:
      operationId: createCheckoutSession
      tags: [subscriptions]
      summary: Create Stripe checkout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
      responses:
        "200":
          description: Checkout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/status:
    get:
      operationId: getSubscriptionStatus
      tags: [subscriptions]
      summary: Get current subscription status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/demo-activate:
    post:
      operationId: demoActivateSubscription
      tags: [subscriptions]
      summary: Activate subscription in demo mode (no Stripe)
      description: |
        Used only when the API is running without `STRIPE_SECRET_KEY`. The
        client receives a `demoActivationUrl` from `createCheckoutSession`
        and POSTs to this endpoint to flip the pending subscription into
        the `active` state immediately.
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: query
          required: true
          schema: { type: string }
        - name: planId
          in: query
          required: true
          schema:
            type: string
            enum: [basic, premium, elite]
      responses:
        "200":
          description: Demo subscription activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoActivateResponse"
        "400":
          description: Invalid or already-processed session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Demo activation not available in production
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/cancel:
    post:
      operationId: cancelSubscription
      tags: [subscriptions]
      summary: Schedule cancellation at period end
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cancellation scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionMutationResponse"
        "400":
          description: No active subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/resume:
    post:
      operationId: resumeSubscription
      tags: [subscriptions]
      summary: Undo a scheduled cancellation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionMutationResponse"
        "400":
          description: No scheduled cancellation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/documents:
    get:
      operationId: getTraderDocuments
      tags: [trader-documents]
      summary: List the current trader's verification documents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Documents and evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderDocumentsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: registerTraderDocument
      tags: [trader-documents]
      summary: Register a successfully uploaded document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTraderDocumentRequest"
      responses:
        "201":
          description: Document registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterTraderDocumentResponse"
        "400":
          description: Invalid document data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/documents/upload-url:
    post:
      operationId: getTraderDocumentUploadUrl
      tags: [trader-documents]
      summary: Request a presigned PUT URL for uploading a document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/documents/{id}:
    delete:
      operationId: deleteTraderDocument
      tags: [trader-documents]
      summary: Delete a pending or rejected trader document
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTraderDocumentResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Approved documents cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review for a trader (customer must have a non-pending enquiry)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review submitted (pending moderation)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid review data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Customer has no eligible enquiry with this trader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A review for this enquiry already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reviews/eligible:
    get:
      operationId: getEligibleEnquiriesForReview
      tags: [reviews]
      summary: List of customer's enquiries that are eligible for a new review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Eligible enquiries (already reviewed entries are excluded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibleEnquiriesResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /traders/{id}/reviews:
    get:
      operationId: getTraderReviews
      tags: [reviews]
      summary: Public list of approved reviews for a trader
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderReviewsResponse"
        "404":
          description: Trader not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/reviews:
    get:
      operationId: getMyTraderReviews
      tags: [reviews]
      summary: Reviews left for the authenticated trader (any status)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All reviews for this trader, including pending and rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderReviewsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/reviews/{id}/reply:
    post:
      operationId: replyToReview
      tags: [reviews]
      summary: Trader posts (or updates) a public reply to one of their reviews
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyToReviewRequest"
      responses:
        "200":
          description: Updated review with reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the trader who owns this review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/reviews:
    get:
      operationId: adminListReviews
      tags: [reviews]
      summary: Admin moderation queue
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, FLAGGED]
      responses:
        "200":
          description: Reviews for moderation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReviewsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/reviews/{id}/moderate:
    post:
      operationId: adminModerateReview
      tags: [reviews]
      summary: Approve / reject / flag a review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerateReviewRequest"
      responses:
        "200":
          description: Updated review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/stripe:
    post:
      operationId: handleStripeWebhook
      tags: [subscriptions]
      summary: Handle Stripe webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /saved-traders:
    get:
      operationId: getSavedTraders
      tags: [saved]
      summary: Get saved traders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saved-traders/{traderId}:
    post:
      operationId: saveTrader
      tags: [saved]
      summary: Save a trader
      security:
        - bearerAuth: []
      parameters:
        - name: traderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unsaveTrader
      tags: [saved]
      summary: Remove saved trader
      security:
        - bearerAuth: []
      parameters:
        - name: traderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enquiries/new-count:
    get:
      operationId: getNewLeadCount
      tags: [enquiries]
      summary: Number of leads the trader hasn't opened yet
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New lead count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewLeadCountResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enquiries:
    post:
      operationId: createEnquiry
      tags: [enquiries]
      summary: Send an enquiry to a trader
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnquiryRequest"
      responses:
        "201":
          description: Enquiry sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getEnquiries
      tags: [enquiries]
      summary: Get enquiries (trader sees received, customer sees sent)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Enquiries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnquiryListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get all trade categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"

  /conversations/unread-count:
    get:
      operationId: getConversationsUnreadCount
      tags: [conversations]
      summary: Total unread message count across my conversations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread total
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: getConversations
      tags: [conversations]
      summary: List my conversations (customer or trader)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a conversation with all messages (marks as read)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetailResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/messages:
    post:
      operationId: sendConversationMessage
      tags: [conversations]
      summary: Send a message in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationMessage"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conversation closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/close:
    post:
      operationId: closeConversation
      tags: [conversations]
      summary: Close a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /conversations/{id}/trader-status:
    patch:
      operationId: updateConversationTraderStatus
      tags: [conversations]
      summary: Trader updates job status (NEW/CONTACTED/QUOTED/COMPLETED)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTraderStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTraderStatusResponse"

  /conversations/{id}/mute:
    patch:
      operationId: muteConversation
      tags: [conversations]
      summary: Mute or unmute push notifications for this conversation (per user)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MuteConversationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MuteConversationResponse"

  /conversations/{id}/report:
    post:
      operationId: reportConversation
      tags: [conversations]
      summary: Report a conversation for moderation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportConversationRequest"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /push-tokens:
    post:
      operationId: registerPushToken
      tags: [push-tokens]
      summary: Register or refresh an Expo push token for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unregisterPushToken
      tags: [push-tokens]
      summary: Unregister a push token for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnregisterPushTokenRequest"
      responses:
        "200":
          description: Unregistered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/conversation-reports:
    get:
      operationId: getAdminConversationReports
      tags: [conversations]
      summary: Admin — list conversation reports
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [OPEN, RESOLVED, DISMISSED]
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConversationReportListResponse"

  /admin/conversations/{id}:
    get:
      operationId: getAdminConversation
      tags: [conversations]
      summary: Admin — view conversation (messages only if reported)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Admin conversation view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConversationResponse"

  /admin/conversation-reports/{id}/resolve:
    post:
      operationId: resolveAdminConversationReport
      tags: [conversations]
      summary: Admin — resolve, dismiss or block a reported conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveReportRequest"
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveReportResponse"

  /companies-house/search:
    get:
      operationId: searchCompaniesHouse
      tags: [companies-house]
      summary: Search the UK Companies House register by name
      description: |
        Public, unauthenticated lookup used during trader registration to
        let the trader pick a confirmed match (which auto-populates address
        and town). Returns up to 6 best matches. Queries shorter than 3
        characters return an empty list.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Company name fragment to search for.
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompaniesHouseSearchResponse"
        "502":
          description: Companies House upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /account/deletion-request:
    post:
      tags: [auth]
      summary: Request account deletion (GDPR)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirm]
              properties:
                password: { type: string, minLength: 1 }
                confirm: { type: boolean, enum: [true] }
                reason: { type: string, maxLength: 2000, nullable: true }
      responses:
        "200":
          description: Deletion request accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, deletionStatus]
                properties:
                  ok: { type: boolean }
                  deletionStatus: { type: string }
                  deletionRequestedAt: { type: string, format: date-time }
                  message: { type: string }
        "401":
          description: Wrong password
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: Too many failed password attempts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /account/deletion-status:
    get:
      tags: [auth]
      summary: Current GDPR deletion status for the signed-in user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Deletion status snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletionStatus: { type: string, nullable: true }
                  deletionRequestedAt: { type: string, format: date-time, nullable: true }
                  deletionReason: { type: string, nullable: true }
                  scheduledHardDeleteAt: { type: string, format: date-time, nullable: true }
                  retentionUntil: { type: string, format: date-time, nullable: true }
                  retentionReason: { type: string, nullable: true }
                  canCancel: { type: boolean }

  /account/deletion-cancel:
    post:
      tags: [auth]
      summary: Cancel a pending account deletion request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, confirm]
              properties:
                password: { type: string, minLength: 1 }
                confirm: { type: boolean, enum: [true] }
      responses:
        "200":
          description: Deletion cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  deletionStatus: { type: string, nullable: true }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterCustomerRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
          minLength: 1
          maxLength: 100
        phone:
          type: string
      required:
        - email
        - password
        - fullName

    RegisterTraderRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        confirmPassword:
          type: string
          minLength: 8
          description: Must match `password` exactly. Validated server-side.
        termsAccepted:
          type: boolean
          description: User explicitly accepted the current Terms of Service.
        privacyAccepted:
          type: boolean
          description: User explicitly accepted the current Privacy Policy.
        contactName:
          type: string
          minLength: 1
          maxLength: 100
        businessName:
          type: string
        companyNumber:
          type: string
          description: |
            Optional UK Companies House registration number. If present, the
            backend treats the trader as having selected a confirmed match
            from the Companies House live search and skips the manual
            "under review" step for the business identity check.
        phone:
          type: string
        mainCategory:
          type: string
        businessAddress:
          type: string
          description: |
            Street address line(s) of the registered business. When the
            trader picks a Companies House match in the live search, this is
            pre-filled from the company's registered office address.
        town:
          type: string
        postcode:
          type: string
      required:
        - email
        - password
        - confirmPassword
        - termsAccepted
        - privacyAccepted
        - contactName
        - businessName
        - phone
        - mainCategory
        - businessAddress
        - town
        - postcode

    RegisterPendingResponse:
      type: object
      description: |
        Returned by /auth/register/customer and /auth/register/trader. The
        account is created but inactive until the email-verification link is
        followed; for traders, full activation also requires a successful
        subscription payment webhook. No JWT is issued in this response.
      properties:
        message:
          type: string
        email:
          type: string
          format: email
        pollToken:
          type: string
          description: Short-lived token clients may poll with to check verification status.
      required:
        - message
        - email
        - pollToken

    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RetryAfterErrorResponse:
      type: object
      properties:
        error:
          type: string
        retryAfterSeconds:
          type: integer
          minimum: 0
      required:
        - error

    TraderOnboardingChecklistStep:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        state:
          type: string
          enum: [completed, pending, action_required, locked, rejected, expired]
        description:
          type: string
        comingSoon:
          type: boolean
      required:
        - key
        - label
        - state

    TraderLegalAcceptance:
      type: object
      properties:
        termsCurrent:
          type: string
        termsAccepted:
          type: string
          nullable: true
        termsNeedsReaccept:
          type: boolean
        privacyCurrent:
          type: string
        privacyAccepted:
          type: string
          nullable: true
        privacyNeedsReaccept:
          type: boolean
        needsReaccept:
          type: boolean
      required:
        - termsCurrent
        - termsNeedsReaccept
        - privacyCurrent
        - privacyNeedsReaccept
        - needsReaccept

    TraderOnboardingStatus:
      type: object
      properties:
        verificationStatus:
          type: string
        message:
          type: string
        isPublic:
          type: boolean
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        businessProfileCompleted:
          type: boolean
        documentsSubmitted:
          type: boolean
        isActive:
          type: boolean
        rejectionReason:
          type: string
          nullable: true
        adminNotes:
          type: string
          nullable: true
        checklist:
          type: array
          items:
            $ref: "#/components/schemas/TraderOnboardingChecklistStep"
        legal:
          $ref: "#/components/schemas/TraderLegalAcceptance"
        email:
          type: string
        businessName:
          type: string
      required:
        - verificationStatus
        - message
        - isPublic
        - emailVerified
        - phoneVerified
        - businessProfileCompleted
        - documentsSubmitted
        - isActive
        - checklist
        - email
        - businessName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [customer, trader, admin]
        isActive:
          type: boolean
        plan:
          type: string
          nullable: true
        pushNotificationsEnabled:
          type: boolean
          description: Global toggle for push notifications across all conversations
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - fullName
        - role
        - isActive

    UpdateNotificationSettingsRequest:
      type: object
      properties:
        pushNotificationsEnabled:
          type: boolean
      required: [pushNotificationsEnabled]

    UpdateNotificationSettingsResponse:
      type: object
      properties:
        ok:
          type: boolean
        pushNotificationsEnabled:
          type: boolean
      required: [ok, pushNotificationsEnabled]

    LeadReminderSettings:
      type: object
      description: |
        Lead-reminder preferences for a trader. `leadReminderMinutes` is the
        chosen push-reminder delay in minutes; `null` means use the platform
        default (60 minutes); `0` means the push reminder is disabled.
        `leadReminderEmailEnabled` controls the companion email independently:
        when false, no reminder email is sent even if the push reminder fires.
      properties:
        leadReminderMinutes:
          type: integer
          nullable: true
          enum: [0, 30, 60, 180, null]
        defaultMinutes:
          type: integer
          description: The platform default used when leadReminderMinutes is null.
        leadReminderEmailEnabled:
          type: boolean
          description: When false, suppress the lead-reminder email regardless of the push setting.
      required: [leadReminderMinutes, defaultMinutes, leadReminderEmailEnabled]

    UpdateLeadReminderSettingsRequest:
      type: object
      properties:
        leadReminderMinutes:
          type: integer
          nullable: true
          enum: [0, 30, 60, 180, null]
        leadReminderEmailEnabled:
          type: boolean

    TraderProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        businessName:
          type: string
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        mainCategory:
          type: string
        additionalServices:
          type: array
          items:
            type: string
        businessAddress:
          type: string
          nullable: true
        town:
          type: string
        postcode:
          type: string
        serviceAreas:
          type: array
          items:
            type: string
        businessDescription:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        openingHours:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        galleryUrls:
          type: array
          items:
            type: string
        socialLinks:
          type: object
          nullable: true
          properties:
            facebook:
              type: string
            twitter:
              type: string
            instagram:
              type: string
            linkedin:
              type: string
        plan:
          type: string
          enum: [basic, premium, elite]
          nullable: true
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        isVerified:
          type: boolean
        verificationStatus:
          type: string
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        businessProfileCompleted:
          type: boolean
        documentsSubmitted:
          type: boolean
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        rating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - businessName
        - contactName
        - email
        - phone
        - mainCategory
        - town
        - postcode
        - isFeatured
        - isActive
        - isVerified
        - verificationStatus
        - emailVerified
        - phoneVerified
        - businessProfileCompleted
        - documentsSubmitted
        - reviewCount

    UpdateTraderProfileRequest:
      type: object
      properties:
        businessName:
          type: string
        contactName:
          type: string
        phone:
          type: string
        mainCategory:
          type: string
        additionalServices:
          type: array
          items:
            type: string
        businessAddress:
          type: string
        town:
          type: string
        postcode:
          type: string
        serviceAreas:
          type: array
          items:
            type: string
        businessDescription:
          type: string
        website:
          type: string
        openingHours:
          type: string
        logoUrl:
          type: string
        galleryUrls:
          type: array
          items:
            type: string
        socialLinks:
          type: object
          properties:
            facebook:
              type: string
            twitter:
              type: string
            instagram:
              type: string
            linkedin:
              type: string

    TraderListResponse:
      type: object
      properties:
        traders:
          type: array
          items:
            $ref: "#/components/schemas/TraderProfile"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - traders
        - total
        - page
        - limit

    SubscriptionPlan:
      type: object
      properties:
        id:
          type: string
          enum: [basic, premium, elite]
        name:
          type: string
        price:
          type: number
        currency:
          type: string
        interval:
          type: string
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
      required:
        - id
        - name
        - price
        - currency
        - interval
        - features
        - isPopular

    SubscriptionPlansResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionPlan"
      required:
        - plans

    CreateCheckoutRequest:
      type: object
      properties:
        planId:
          type: string
          enum: [basic, premium, elite]
      required:
        - planId

    CheckoutSessionResponse:
      type: object
      description: |
        Response from creating a Stripe checkout session.

        In demo mode (no STRIPE_SECRET_KEY configured), `url` is the literal
        sentinel `"DEMO_MODE"` and `demoActivationUrl` is set to a relative
        backend path the client can POST to in order to activate the
        subscription instantly without going through Stripe. In real mode
        `demoActivationUrl` is omitted and `url` is the live Stripe-hosted
        checkout URL the client should open.
      properties:
        sessionId:
          type: string
        url:
          type: string
        demoActivationUrl:
          type: string
          nullable: true
          description: Present only in demo mode. Relative path to POST to in order to activate the subscription.
      required:
        - sessionId
        - url

