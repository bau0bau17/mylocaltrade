openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MyLocalTrade API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: traders
    description: Trader listing operations
  - name: profile
    description: Trader profile management
  - name: trader
    description: Trader onboarding and self-service
  - name: subscriptions
    description: Subscription and billing
  - name: saved
    description: Saved traders
  - name: enquiries
    description: Enquiries and leads
  - name: categories
    description: Trade categories
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register/customer:
    post:
      operationId: registerCustomer
      tags: [auth]
      summary: Register a new customer
      description: |
        Creates an inactive customer account and emails a verification link.
        The account cannot sign in until the email is verified. The response
        is a pending-registration acknowledgement, NOT a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCustomerRequest"
      responses:
        "201":
          description: Account created — verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPendingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register/trader:
    post:
      operationId: registerTrader
      tags: [auth]
      summary: Register a new trader
      description: |
        Creates an inactive trader account and an associated trader profile,
        then emails a verification link. The trader account becomes
        publicly visible only after a successful subscription payment
        webhook (see /subscriptions/checkout). The response is a
        pending-registration acknowledgement, NOT a session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterTraderRequest"
      responses:
        "201":
          description: Account created — verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPendingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerificationEmail
      tags: [auth]
      summary: Resend the email verification link
      description: |
        Resends the email-verification link for an unverified account.
        Always responds 200 with a generic message when the email is unknown
        (to avoid leaking which addresses are registered). Rate-limited to
        one request per 60 seconds per account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationRequest"
      responses:
        "200":
          description: Resend handled (success or already-verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Missing email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Cooldown still active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryAfterErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trader/onboarding-status:
    get:
      operationId: getTraderOnboardingStatus
      tags: [trader]
      summary: Get the signed-in trader's onboarding/verification status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderOnboardingStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller is not a trader
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trader profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /traders:
    get:
      operationId: listTraders
      tags: [traders]
      summary: List traders with optional search/filter
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"

  /traders/featured:
    get:
      operationId: getFeaturedTraders
      tags: [traders]
      summary: Get featured traders
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Featured traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"

  /traders/{id}:
    get:
      operationId: getTrader
      tags: [traders]
      summary: Get trader by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "404":
          description: Trader not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getTraderProfile
      tags: [profile]
      summary: Get own trader profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Trader profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTraderProfile
      tags: [profile]
      summary: Update trader profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTraderProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/plans:
    get:
      operationId: getSubscriptionPlans
      tags: [subscriptions]
      summary: Get available subscription plans
      responses:
        "200":
          description: Subscription plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlansResponse"

  /subscriptions/checkout:
    post:
      operationId: createCheckoutSession
      tags: [subscriptions]
      summary: Create Stripe checkout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutRequest"
      responses:
        "200":
          description: Checkout session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscriptions/status:
    get:
      operationId: getSubscriptionStatus
      tags: [subscriptions]
      summary: Get current subscription status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/stripe:
    post:
      operationId: handleStripeWebhook
      tags: [subscriptions]
      summary: Handle Stripe webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /saved-traders:
    get:
      operationId: getSavedTraders
      tags: [saved]
      summary: Get saved traders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved traders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraderListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saved-traders/{traderId}:
    post:
      operationId: saveTrader
      tags: [saved]
      summary: Save a trader
      security:
        - bearerAuth: []
      parameters:
        - name: traderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unsaveTrader
      tags: [saved]
      summary: Remove saved trader
      security:
        - bearerAuth: []
      parameters:
        - name: traderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trader removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enquiries:
    post:
      operationId: createEnquiry
      tags: [enquiries]
      summary: Send an enquiry to a trader
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnquiryRequest"
      responses:
        "201":
          description: Enquiry sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getEnquiries
      tags: [enquiries]
      summary: Get enquiries (trader sees received, customer sees sent)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Enquiries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnquiryListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get all trade categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterCustomerRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
        phone:
          type: string
      required:
        - email
        - password
        - fullName

    RegisterTraderRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        confirmPassword:
          type: string
          minLength: 8
          description: Must match `password` exactly. Validated server-side.
        termsAccepted:
          type: boolean
          description: User explicitly accepted the current Terms of Service.
        privacyAccepted:
          type: boolean
          description: User explicitly accepted the current Privacy Policy.
        contactName:
          type: string
        businessName:
          type: string
        phone:
          type: string
        mainCategory:
          type: string
        town:
          type: string
        postcode:
          type: string
      required:
        - email
        - password
        - confirmPassword
        - termsAccepted
        - privacyAccepted
        - contactName
        - businessName
        - phone
        - mainCategory
        - town
        - postcode

    RegisterPendingResponse:
      type: object
      description: |
        Returned by /auth/register/customer and /auth/register/trader. The
        account is created but inactive until the email-verification link is
        followed; for traders, full activation also requires a successful
        subscription payment webhook. No JWT is issued in this response.
      properties:
        message:
          type: string
        email:
          type: string
          format: email
        pollToken:
          type: string
          description: Short-lived token clients may poll with to check verification status.
      required:
        - message
        - email
        - pollToken

    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RetryAfterErrorResponse:
      type: object
      properties:
        error:
          type: string
        retryAfterSeconds:
          type: integer
          minimum: 0
      required:
        - error

    TraderOnboardingChecklistStep:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        state:
          type: string
          enum: [completed, pending, action_required, locked, rejected, expired]
        description:
          type: string
        comingSoon:
          type: boolean
      required:
        - key
        - label
        - state

    TraderLegalAcceptance:
      type: object
      properties:
        termsCurrent:
          type: string
        termsAccepted:
          type: string
          nullable: true
        termsNeedsReaccept:
          type: boolean
        privacyCurrent:
          type: string
        privacyAccepted:
          type: string
          nullable: true
        privacyNeedsReaccept:
          type: boolean
        needsReaccept:
          type: boolean
      required:
        - termsCurrent
        - termsNeedsReaccept
        - privacyCurrent
        - privacyNeedsReaccept
        - needsReaccept

    TraderOnboardingStatus:
      type: object
      properties:
        verificationStatus:
          type: string
        message:
          type: string
        isPublic:
          type: boolean
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        businessProfileCompleted:
          type: boolean
        documentsSubmitted:
          type: boolean
        isActive:
          type: boolean
        rejectionReason:
          type: string
          nullable: true
        adminNotes:
          type: string
          nullable: true
        checklist:
          type: array
          items:
            $ref: "#/components/schemas/TraderOnboardingChecklistStep"
        legal:
          $ref: "#/components/schemas/TraderLegalAcceptance"
        email:
          type: string
        businessName:
          type: string
      required:
        - verificationStatus
        - message
        - isPublic
        - emailVerified
        - phoneVerified
        - businessProfileCompleted
        - documentsSubmitted
        - isActive
        - checklist
        - email
        - businessName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [customer, trader]
        isActive:
          type: boolean
        plan:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - fullName
        - role
        - isActive

    TraderProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        businessName:
          type: string
        contactName:
          type: string
        email:
          type: string
        phone:
          type: string
        mainCategory:
          type: string
        additionalServices:
          type: array
          items:
            type: string
        businessAddress:
          type: string
          nullable: true
        town:
          type: string
        postcode:
          type: string
        serviceAreas:
          type: array
          items:
            type: string
        businessDescription:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        openingHours:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        galleryUrls:
          type: array
          items:
            type: string
        socialLinks:
          type: object
          nullable: true
          properties:
            facebook:
              type: string
            twitter:
              type: string
            instagram:
              type: string
            linkedin:
              type: string
        plan:
          type: string
          enum: [basic, premium, elite]
          nullable: true
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        isVerified:
          type: boolean
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        rating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - businessName
        - contactName
        - email
        - phone
        - mainCategory
        - town
        - postcode
        - isFeatured
        - isActive
        - isVerified
        - reviewCount

    UpdateTraderProfileRequest:
      type: object
      properties:
        businessName:
          type: string
        contactName:
          type: string
        phone:
          type: string
        mainCategory:
          type: string
        additionalServices:
          type: array
          items:
            type: string
        businessAddress:
          type: string
        town:
          type: string
        postcode:
          type: string
        serviceAreas:
          type: array
          items:
            type: string
        businessDescription:
          type: string
        website:
          type: string
        openingHours:
          type: string
        logoUrl:
          type: string
        galleryUrls:
          type: array
          items:
            type: string
        socialLinks:
          type: object
          properties:
            facebook:
              type: string
            twitter:
              type: string
            instagram:
              type: string
            linkedin:
              type: string

    TraderListResponse:
      type: object
      properties:
        traders:
          type: array
          items:
            $ref: "#/components/schemas/TraderProfile"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - traders
        - total
        - page
        - limit

    SubscriptionPlan:
      type: object
      properties:
        id:
          type: string
          enum: [basic, premium, elite]
        name:
          type: string
        price:
          type: number
        currency:
          type: string
        interval:
          type: string
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
      required:
        - id
        - name
        - price
        - currency
        - interval
        - features
        - isPopular

    SubscriptionPlansResponse:
      type: object
      properties:
        plans:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionPlan"
      required:
        - plans

    CreateCheckoutRequest:
      type: object
      properties:
        planId:
          type: string
          enum: [basic, premium, elite]
      required:
        - planId

    CheckoutSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
        url:
          type: string
      required:
        - sessionId
        - url

    SubscriptionStatus:
      type: object
      properties:
        plan:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, past_due, cancelled]
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
      required:
        - status
        - cancelAtPeriodEnd

    CreateEnquiryRequest:
      type: object
      properties:
        traderId:
          type: integer
        message:
          type: string
        serviceRequired:
          type: string
        preferredDate:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
      required:
        - traderId
        - message
        - serviceRequired

    Enquiry:
      type: object
      properties:
        id:
          type: integer
        traderId:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        traderBusinessName:
          type: string
        message:
          type: string
        serviceRequired:
          type: string
        preferredDate:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, responded, closed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - traderId
        - customerId
        - customerName
        - customerEmail
        - traderBusinessName
        - message
        - serviceRequired
        - status
        - createdAt

    EnquiryListResponse:
      type: object
      properties:
        enquiries:
          type: array
          items:
            $ref: "#/components/schemas/Enquiry"
        total:
          type: integer
      required:
        - enquiries
        - total

    CategoriesResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
      required:
        - categories

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        traderCount:
          type: integer
      required:
        - id
        - name
        - icon
        - traderCount
